<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VetGroup"/>
<meta name="theme-color" content="#0d1a12"/>
<title>VetGroup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1a12;--bg2:#0f2217;--bg3:#111f16;--bg4:#1a3d23;
  --border:#1e3d26;--border2:#2e5c38;
  --green:#4ade80;--green2:#6fcf8a;--green3:#3a6645;
  --gold:#b8893a;--gold2:#e8d5b0;
  --blue:#60a5fa;--red:#f87171;
  --text:#e8f5e2;--text3:#5a8a68;--text4:#3a6645;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:90px;background:var(--bg)}
.scroll::-webkit-scrollbar{display:none}

.header{background:linear-gradient(135deg,#0a1f10,#0d2b1a,#0f3320);border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;padding:14px 16px 6px;gap:12}
.logo{width:56px;height:56px;border-radius:10px;object-fit:cover;border:2px solid #b8893a44;box-shadow:0 2px 12px #b8893a33;flex-shrink:0}
.htext{flex:1}
.hname{font-size:16px;font-weight:800;color:var(--gold2);line-height:1.2}
.hbrand{font-size:12px;font-weight:600;color:var(--gold);letter-spacing:2px;margin-top:1px}
.hcount{font-size:11px;color:#4ade8066;margin-top:3px}
.langbtn{background:var(--bg4);border:1px solid var(--border2);color:var(--green2);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg2)}
.tab{flex:1;padding:11px 0;background:none;border:none;color:var(--text3);font-size:14px;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit}
.tab.on{color:var(--green);font-weight:700;border-bottom-color:var(--green)}

.months{padding:10px 14px;background:var(--bg2);border-bottom:1px solid #1a3020;display:flex;gap:7px;overflow-x:auto;align-items:center}
.months::-webkit-scrollbar{display:none}
.mchip{white-space:nowrap;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg4);color:var(--green2);font-size:12px;cursor:pointer;font-family:inherit}
.mchip.on{background:var(--green);color:var(--bg);font-weight:700;border-color:var(--green)}

.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px 14px;margin:0 14px 10px;position:relative}
.crow{display:flex;justify-content:space-between;align-items:flex-start}
.cname{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.badge{font-size:11px;border-radius:6px;padding:2px 7px;font-weight:600}
.cproc{font-size:13px;color:var(--green2);margin-top:4px}
.cdate{font-size:12px;color:var(--text4);margin-top:3px}
.ctotal{font-size:18px;font-weight:700;color:var(--green);text-align:left}
.cvat{font-size:11px;color:var(--text4)}
.delx{position:absolute;top:10px;left:10px;background:none;border:none;color:var(--text4);font-size:16px;cursor:pointer;padding:4px}
.delconf{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.bsm{border-radius:8px;padding:5px 14px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;border:1px solid}
.bcancel{background:var(--bg4);border-color:var(--border2);color:var(--green2)}
.bdel{background:#3d1a1a;border-color:#6b3030;color:var(--red)}

.sumcard{background:linear-gradient(135deg,#0f3320,#1a4a28);border:1px solid var(--border2);border-radius:14px;padding:18px;margin:14px 14px 10px}
.sumtotal{font-size:34px;font-weight:700;color:var(--green)}
.summeta{display:flex;gap:20px;margin-top:8px}
.export{display:block;width:calc(100% - 28px);margin:4px 14px;padding:13px;background:var(--bg4);border:1px solid var(--border2);color:var(--green);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.empty{text-align:center;color:var(--text4);padding:50px 0;font-size:15px}

.fab{position:fixed;bottom:24px;right:24px;background:var(--green);color:var(--bg);border:none;border-radius:16px;padding:14px 22px;font-size:15px;font-weight:700;box-shadow:0 4px 20px #4ade8055;cursor:pointer;font-family:inherit;z-index:100}

.overlay{position:fixed;inset:0;background:#000000bb;z-index:200;display:none;align-items:flex-end}
.overlay.show{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:22px 16px 36px;width:100%;max-height:92vh;overflow-y:auto;border:1px solid var(--border);border-bottom:none;-webkit-overflow-scrolling:touch}
.modal::-webkit-scrollbar{display:none}
.mtitle{font-weight:700;font-size:17px;margin-bottom:16px;color:var(--green)}

.label{font-size:12px;color:var(--text3);margin-bottom:5px;font-weight:500}
.input{width:100%;padding:11px 12px;background:var(--bg4);border:1px solid var(--border2);color:var(--text);border-radius:10px;font-size:14px;margin-bottom:13px;outline:none;font-family:inherit;-webkit-appearance:none}
.input:focus{border-color:var(--green)}
.trow{display:flex;gap:8px;margin-bottom:13px}
.tbtn{flex:1;padding:10px;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px;font-family:inherit;border:1px solid var(--border2);background:var(--bg4);color:var(--text3)}
.tbtn.vet{border-color:var(--green);background:#4ade8022;color:var(--green)}
.tbtn.owner{border-color:var(--blue);background:#60a5fa22;color:var(--blue)}
.tbtn.animal{border-color:var(--green);background:#4ade8022;color:var(--green)}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px}
.chip{padding:5px 10px;border-radius:8px;font-size:11px;font-family:inherit;cursor:pointer;border:1px solid var(--border2);background:var(--bg4);color:var(--text3);white-space:nowrap}
.chip.on{border-color:var(--green);background:#4ade8033;color:var(--green)}
.vatrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.vatsw{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative}
.vatknob{position:absolute;top:3px;width:18px;height:18px;border-radius:50%}
.preview{background:var(--bg4);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;font-size:13px}
.bottombtns{display:flex;gap:10px;margin-top:4px}
.bcancellg{flex:1;padding:13px;background:var(--bg4);border:1px solid var(--border2);color:var(--green2);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.bsave{flex:2;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.bsave.ready{background:var(--green);color:var(--bg)}
.bsave.off{background:var(--bg4);color:var(--text4);opacity:.5;cursor:default}
.bsave.ready{background:var(--green);color:var(--bg);cursor:pointer}

/* Swipe to reveal actions */
.swipe-wrap{position:relative;margin:0 14px 10px;overflow:hidden;border-radius:12px}
.swipe-actions{position:absolute;top:0;bottom:0;right:0;display:flex;align-items:stretch}
.swipe-actions button{border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;padding:0 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.swipe-edit{background:#1a3d6b;color:#90c2ff}
.swipe-del{background:#6b1a1a;color:#ffaaaa}
.swipe-card{position:relative;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px 14px;transition:transform .25s ease;will-change:transform;touch-action:pan-y}
</style>
</head>

function filtered(){
  var fe=filterMonth==="all"?entries:entries.filter(function(e){return monthOf(e.date)===filterMonth;});
  return fe.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
}

// ── Render top ────────────────────────────────────────────────
function render(){
  document.getElementById("hname").textContent=lang==="he"?"ד״ר באסל חג׳אזי":"Dr. Basel Hajazi";
  document.getElementById("hcount").textContent=entries.length+" "+t().entries;
  document.getElementById("langbtn").textContent=t().lang;
  document.documentElement.dir=lang==="he"?"rtl":"ltr";
  document.getElementById("tablog").textContent=t().log;
  document.getElementById("tabsum").textContent=t().sum;
  document.getElementById("tablog").className="tab"+(tab==="log"?" on":"");
  document.getElementById("tabsum").className="tab"+(tab==="sum"?" on":"");
  document.getElementById("fab").textContent=t().add;
  renderMonths();
  renderContent();
}

function renderMonths(){
  var ms=[];
  entries.forEach(function(e){var m=monthOf(e.date);if(ms.indexOf(m)<0)ms.push(m);});
  ms.sort().reverse();
  var html='<button class="mchip'+(filterMonth==="all"?" on":"")+'" data-m="all">'+t().all+'</button>';
  ms.forEach(function(m){html+='<button class="mchip'+(filterMonth===m?" on":"")+'" data-m="'+m+'">'+monthLabel(m)+'</button>';});
  document.getElementById("months").innerHTML=html;
}

function renderContent(){
  if(tab==="log") renderLog(); else renderSum();
}

function renderLog(){
  var list=filtered();
  if(list.length===0){document.getElementById("content").innerHTML='<div class="empty">'+t().none+'</div>';return;}
  var html="";
  list.forEach(function(e){
    var c2=tcolor(e.type);var tl=e.type==="vet"?t().vet:t().owner;
    html+='<div class="swipe-wrap">';
    html+='<div class="swipe-actions"><button class="swipe-edit" data-edit="'+e.id+'">✏️<span>'+(lang==="he"?"ערוך":"Edit")+'</span></button><button class="swipe-del" data-del="'+e.id+'">🗑<span>'+t().del+'</span></button></div>';
    html+='<div class="swipe-card" data-card="'+e.id+'">';
    html+='<div class="crow"><div style="flex:1">';
    html+='<div class="cname"><span>'+esc(e.customer)+'</span><span class="badge" style="background:'+c2+'22;color:'+c2+'">'+tl+'</span><span>'+emoji(e.animal)+'</span></div>';
    html+='<div class="cproc">'+esc(e.procedure)+'</div><div class="cdate">'+e.date+'</div></div>';
    html+='<div style="text-align:left;margin-inline-start:12px"><div class="ctotal">₪'+e.total.toFixed(2)+'</div><div class="cvat">'+t().vatL+': ₪'+e.vat.toFixed(2)+'</div></div></div>';
    html+='</div></div>';
  });
  document.getElementById("content").innerHTML=html;
  attachSwipe();
}

function attachSwipe(){
  var cards=document.querySelectorAll(".swipe-card");
  var REVEAL=140; // width of action area
  cards.forEach(function(card){
    var startX=0,curX=0,dragging=false,opened=false;
    card.addEventListener("touchstart",function(ev){
      startX=ev.touches[0].clientX;dragging=true;card.style.transition="none";
    },{passive:true});
    card.addEventListener("touchmove",function(ev){
      if(!dragging)return;
      var dx=ev.touches[0].clientX-startX;
      var base=opened?-REVEAL:0;
      var nx=base+dx;
      // RTL: actions on right, card slides left (negative) to reveal
      if(nx>0)nx=0; if(nx<-REVEAL)nx=-REVEAL;
      curX=nx;card.style.transform="translateX("+nx+"px)";
    },{passive:true});
    card.addEventListener("touchend",function(){
      dragging=false;card.style.transition="transform .25s ease";
      if(curX<-REVEAL/2){card.style.transform="translateX(-"+REVEAL+"px)";opened=true;}
      else{card.style.transform="translateX(0)";opened=false;}
    });
  });
}

function renderSum(){
  var list=filtered();
  var gt=0,gp=0,gv=0;
  list.forEach(function(e){gt+=e.total;gp+=e.pre;gv+=e.vat;});
  var byC={};
  list.forEach(function(e){
    if(!byC[e.customer])byC[e.customer]={items:[],total:0,vat:0,type:e.type};
    byC[e.customer].items.push(e);byC[e.customer].total+=e.total;byC[e.customer].vat+=e.vat;
  });
  var html='<div class="sumcard"><div style="font-size:12px;color:#6fcf8a;margin-bottom:6px">'+t().grand+'</div>';
  html+='<div class="sumtotal">₪'+gt.toFixed(2)+'</div><div class="summeta">';
  html+='<div><div style="font-size:11px;color:#3a6645">'+t().baseL+'</div><div style="font-size:14px;font-weight:600">₪'+gp.toFixed(2)+'</div></div>';
  html+='<div><div style="font-size:11px;color:#3a6645">'+t().vatL+'</div><div style="font-size:14px;font-weight:600">₪'+gv.toFixed(2)+'</div></div>';
  html+='<div><div style="font-size:11px;color:#3a6645">'+t().entries+'</div><div style="font-size:14px;font-weight:600">'+list.length+'</div></div>';
  html+='</div></div>';
  var names=Object.keys(byC).sort(function(a,b){return byC[b].total-byC[a].total;});
  names.forEach(function(name){
    var d=byC[name];var c=tcolor(d.type);
    html+='<div class="card"><div class="crow"><div><div style="font-weight:700;font-size:15px">'+esc(name)+'</div>';
    html+='<div style="font-size:11px;color:'+c+';margin-top:2px">'+(d.type==="vet"?t().vet:t().owner)+' · '+d.items.length+' '+t().entries+'</div></div>';
    html+='<div style="text-align:left"><div style="font-size:20px;font-weight:700;color:#4ade80">₪'+d.total.toFixed(2)+'</div><div style="font-size:11px;color:#3a6645">'+t().vatL+': ₪'+d.vat.toFixed(2)+'</div></div></div>';
    html+='<div style="margin-top:8px;border-top:1px solid #1a3020;padding-top:8px">';
    d.items.forEach(function(e){html+='<div style="display:flex;justify-content:space-between;font-size:12px;color:#5a8a68;padding:2px 0"><span>'+e.date+' · '+emoji(e.animal)+' '+esc(e.procedure)+'</span><span style="color:#6fcf8a;font-weight:600">₪'+e.total.toFixed(2)+'</span></div>';});
    html+='</div></div>';
  });
  if(list.length>0) html+='<button class="export" id="exportbtn">📊 '+t().exp+'</button>';
  document.getElementById("content").innerHTML=html;
}

// ── Form ──────────────────────────────────────────────────────
function openForm(){
  editId=null;
  form=newForm();
  document.getElementById("mtitle").textContent=t().add;
  renderForm();
  document.getElementById("overlay").className="overlay show";
}
function startEdit(id){
  var e=null;for(var i=0;i<entries.length;i++){if(entries[i].id===id){e=entries[i];break;}}
  if(!e)return;
  editId=id;
  form={date:e.date,customer:e.customer,type:e.type,animal:e.animal,procedure:e.procedure,basePrice:e.basePrice,inclVat:e.inclVat};
  document.getElementById("mtitle").textContent=(lang==="he"?"✏️ עריכת רשומה":"✏️ Edit Entry");
  renderForm();
  document.getElementById("overlay").className="overlay show";
}
function closeForm(){document.getElementById("overlay").className="overlay";}

function syncForm(){
  var d=document.getElementById("f-date");if(d)form.date=d.value;
  var c=document.getElementById("f-cust");if(c)form.customer=c.value;
  var p=document.getElementById("f-price");if(p)form.basePrice=p.value;
  var pr=document.getElementById("f-proc");if(pr)form.procedure=pr.value;
}

function renderForm(){
  var procs=PROCS[lang];
  var a=calc(form.basePrice,form.inclVat);
  var ready=!!(form.customer&&form.procedure&&form.basePrice);
  var h="";
  h+='<div class="label">'+t().date+'</div>';
  h+='<input type="date" id="f-date" class="input" value="'+form.date+'"/>';
  h+='<div class="label">'+t().cust+'</div>';
  h+='<input type="text" id="f-cust" class="input" value="'+esc(form.customer)+'" placeholder="'+t().cust+'"/>';
  h+='<div class="label">'+t().type+'</div><div class="trow">';
  h+='<button class="tbtn'+(form.type==="vet"?" vet":"")+'" data-type="vet">'+t().vet+'</button>';
  h+='<button class="tbtn'+(form.type==="owner"?" owner":"")+'" data-type="owner">'+t().owner+'</button></div>';
  h+='<div class="label">'+t().animal+'</div><div class="trow">';
  h+='<button class="tbtn'+(form.animal==="dog"?" animal":"")+'" data-animal="dog">'+t().dog+'</button>';
  h+='<button class="tbtn'+(form.animal==="cat"?" animal":"")+'" data-animal="cat">'+t().cat+'</button>';
  h+='<button class="tbtn'+(form.animal==="other"?" animal":"")+'" data-animal="other">'+t().other+'</button></div>';
  h+='<div class="label">'+t().proc+'</div>';
  var inList=procs.indexOf(form.procedure)>=0;
  h+='<select id="f-proc-sel" class="input" style="margin-bottom:8px">';
  h+='<option value="">'+(lang==="he"?"— בחר מהרשימה —":"— Pick from list —")+'</option>';
  procs.forEach(function(p,i){h+='<option value="'+i+'"'+(form.procedure===p?" selected":"")+'>'+p+'</option>';});
  h+='<option value="__manual__"'+((!inList&&form.procedure)?" selected":"")+'>'+(lang==="he"?"✏️ הזנה ידנית":"✏️ Manual entry")+'</option>';
  h+='</select>';
  h+='<input type="text" id="f-proc" class="input" value="'+esc(form.procedure)+'" placeholder="'+t().procPh+'"/>';
  h+='<div class="label">'+t().price+'</div>';
  h+='<input type="number" id="f-price" class="input" value="'+form.basePrice+'" placeholder="0.00"/>';
  h+='<div class="vatrow"><span style="font-size:13px;color:#6fcf8a">'+t().vatQ+'</span>';
  h+='<button class="vatsw" data-vat="1" style="background:'+(form.inclVat?"#4ade80":"#1a3d23")+'"><div class="vatknob" style="left:'+(form.inclVat?"22px":"3px")+';background:'+(form.inclVat?"#0d1a12":"#3a6645")+'"></div></button>';
  h+='<span style="font-size:12px;color:#3a6645">'+(form.inclVat?t().yes:t().no)+(form.basePrice?" · ₪"+a.total.toFixed(2):"")+'</span></div>';
  if(form.basePrice){
    h+='<div class="preview"><span style="color:#5a8a68">'+t().baseL+': ₪'+a.pre.toFixed(2)+'</span>';
    h+='<span style="color:#5a8a68">'+t().vatL+': ₪'+a.vat.toFixed(2)+'</span>';
    h+='<span style="color:#4ade80;font-weight:700">₪'+a.total.toFixed(2)+'</span></div>';
  }
  h+='<div class="bottombtns"><button class="bcancellg" data-close="1">'+t().cancel+'</button>';
  h+='<button class="bsave'+(ready?" ready":" off")+'" data-save="1">'+t().save+'</button></div>';
  document.getElementById("mbody").innerHTML=h;
}

function saveEntry(){
  syncForm();
  if(!form.customer||!form.procedure||!form.basePrice) return;
  var a=calc(form.basePrice,form.inclVat);
  if(editId!==null){
    for(var i=0;i<entries.length;i++){
      if(entries[i].id===editId){
        entries[i]={date:form.date,customer:form.customer,type:form.type,animal:form.animal,procedure:form.procedure,basePrice:form.basePrice,inclVat:form.inclVat,pre:a.pre,vat:a.vat,total:a.total,id:editId};
        break;
      }
    }
    editId=null;
  } else {
    entries.unshift({date:form.date,customer:form.customer,type:form.type,animal:form.animal,procedure:form.procedure,basePrice:form.basePrice,inclVat:form.inclVat,pre:a.pre,vat:a.vat,total:a.total,id:Date.now()});
  }
  saveData();closeForm();render();
}

function exportCSV(){
  var list=filtered();
  var rows=[["Date","Customer","Type","Animal","Procedure","Pre-VAT","VAT","Total"]];
  list.forEach(function(e){rows.push([e.date,e.customer,e.type,e.animal,e.procedure,e.pre,e.vat,e.total]);});
  var csv=rows.map(function(r){return r.join(",");}).join("\n");
  var blob=new Blob([csv],{type:"text/csv"});
  var aEl=document.createElement("a");
  aEl.href=URL.createObjectURL(blob);
  aEl.download="vet-"+filterMonth+".csv";
  aEl.click();
}

// ── Events (delegation) ───────────────────────────────────────
document.getElementById("langbtn").addEventListener("click",function(){lang=lang==="he"?"en":"he";render();});
document.getElementById("tablog").addEventListener("click",function(){tab="log";render();});
document.getElementById("tabsum").addEventListener("click",function(){tab="sum";render();});
document.getElementById("fab").addEventListener("click",openForm);

document.getElementById("months").addEventListener("click",function(e){
  var b=e.target.closest("[data-m]");if(!b)return;filterMonth=b.getAttribute("data-m");render();
});

document.getElementById("content").addEventListener("click",function(e){
  var b=e.target.closest("button");if(!b)return;
  if(b.getAttribute("data-del")){var id=parseInt(b.getAttribute("data-del"));entries=entries.filter(function(x){return x.id!==id;});saveData();render();}
  else if(b.getAttribute("data-edit")){startEdit(parseInt(b.getAttribute("data-edit")));}
  else if(b.id==="exportbtn"){exportCSV();}
});

document.getElementById("overlay").addEventListener("click",function(e){
  if(e.target.id==="overlay"){closeForm();return;}
  var b=e.target.closest("button");if(!b)return;
  if(b.getAttribute("data-type")){syncForm();form.type=b.getAttribute("data-type");renderForm();}
  else if(b.getAttribute("data-animal")){syncForm();form.animal=b.getAttribute("data-animal");renderForm();}
  else if(b.getAttribute("data-vat")){syncForm();form.inclVat=!form.inclVat;renderForm();}
  else if(b.getAttribute("data-close")){closeForm();}
  else if(b.getAttribute("data-save")){saveEntry();}
});

// keep form state as user types (no re-render needed)
document.getElementById("overlay").addEventListener("input",function(e){
  var el=e.target;
  if(el.id==="f-cust")form.customer=el.value;
  else if(el.id==="f-price")form.basePrice=el.value;
  else if(el.id==="f-proc")form.procedure=el.value;
  else if(el.id==="f-date")form.date=el.value;
});

document.getElementById("overlay").addEventListener("change",function(e){
  if(e.target.id==="f-proc-sel"){
    var v=e.target.value;
    syncForm();
    if(v===""){ /* keep current */ }
    else if(v==="__manual__"){ form.procedure=""; }
    else { form.procedure=PROCS[lang][parseInt(v)]; }
    renderForm();
    if(v==="__manual__"){ var fi=document.getElementById("f-proc"); if(fi) fi.focus(); }
  }
});

// ── Init ──────────────────────────────────────────────────────
loadData();
render();
})();
</script>
